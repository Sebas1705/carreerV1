server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Try to serve files directly, otherwise fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Expose a simple health check passthrough
    location /healthz {
        try_files $uri $uri/ =404;
    }
}
